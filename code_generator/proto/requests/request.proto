syntax = "proto3";

package request;

import "structs/collections.proto";
import "structs/files.proto";
import "structs/groups.proto";
import "structs/messaging.proto";
import "structs/peers.proto";
import "enums/presence.proto";

message Request {
  WsRequest ws_request = 1;
}

message WsRequest {
  string service_name = 1;
  string method = 2;
  bytes payload = 3;
  Metadata metadata = 4;
  int64 index = 5;
}


message MetadataComplexValues {
  fixed64 fixed64_value = 6;
}

message MetadataValues {
  string string_value = 1;
  MetadataComplexValues msg_value = 2;
}

message MetadataKeyValues {
  string key = 1;
  MetadataValues value = 2;
}

message Metadata {
  repeated MetadataKeyValues key_values = 1;
}


message KeepAliveRequest {
  KeepAlive payloads = 2;
}

message KeepAlive {
  uint32 value_should_2 = 1;
}


message SetOnline {
  uint32 is_online = 1;
  uint32 duration = 2;
}

message EditName {
  string name = 1;
}

message SendMessage {
  structs.Peer peer = 1;
  int64 rid = 2;
  structs.Message message = 3;
  structs.Peer ex_peer = 6;
}

message UpdateMessage {
  structs.Peer peer = 1;
  int64 rid = 2;
  structs.Message updated_message = 3;
}

message DeleteMessage {
  structs.Peer peer = 1;
  repeated int64 rids = 2;
  structs.DeleteDates dates = 3;
  bool just_mine = 4;
}

message ForwardMessages {
  structs.Peer peer = 1;
  repeated int64 rid = 2;
  repeated structs.HistoryMessageIdentifier forwarded_messages = 3;
}

message GetMessageViews {
  structs.Peer peer = 1;
  repeated structs.MessageId mids = 2;
  bool increment = 3;
}

message MessageSetReaction {
  structs.Peer peer = 1;
  int64 rid = 2;
  string code = 3;
  int64 date = 4;
}

message LoadHistory {
  structs.Peer peer = 1;
  int64 date = 2;
  int32 load_mode = 4;
  int32 limit = 5;
  repeated int32 optimizations = 6;
}

message JoinGroup {
  string token = 1;
  repeated int32 optimizations = 2;
}

message JoinPublicGroup {
  structs.Peer peer = 1;
  repeated int32 optimizations = 2;
}

message LeaveGroup {
  structs.GroupOutPeer group_peer = 1;
  int64 rid = 2;
  repeated int32 optimizations = 3;
  bool make_orphan = 4;
}

message LoadUsers {
  repeated structs.UserOutPeer user_peers = 1;
}

message LoadFullUsers {
  repeated structs.UserOutPeer user_peers = 1;
}

message GetFullGroup {
  structs.GroupOutPeer peer = 1;
}

message SearchContacts {
  string request = 1;
  repeated int32 optimizations = 2;
}

// Pin Message (Group)
message PinMessage {
  int32 sender_user_id = 1;
  structs.GroupOutPeer group_peer = 2;
  int64 date = 3;
  int64 msg_rid = 4;
}

// Pin Messages (Messaging)
message PinMessages {
  structs.Peer peer = 1;
  structs.MessageId message_id = 2;
  bool just_mine = 3;
}

message UnPinMessages {
  structs.ExPeer peer = 1;
  repeated structs.MessageId message_ids = 2;
  bool all = 3;
}

message EditGroupAvatar {
  structs.GroupOutPeer group_peer = 1;
  structs.FileLocation file_location = 3;
  int64 rid = 4;
  repeated int32 optimizations = 5;
}

message LoadGroupAvatars {
  structs.GroupOutPeer peer = 1;
}

message RemoveGroupAvatar {
  structs.GroupOutPeer group_peer = 1;
  int64 rid = 4;
  repeated int32 optimizations = 5;
  structs.Int64Value avatar_id = 6;
}

message EditGroupTitle {
  structs.GroupOutPeer group_peer = 1;
  string title = 3;
  int64 rid = 4;
  repeated int32 optimizations = 5;
}

message EditGroupAbout {
  structs.GroupOutPeer group_peer = 1;
  int64 rid = 2;
  string about = 3;
  repeated int32 optimizations = 5;
}

message RevokeInviteUrl {
  structs.GroupOutPeer group_peer = 1;
}

message UnBanUser {
  structs.GroupOutPeer group_peer = 1;
  structs.UserOutPeer user = 2;
  repeated int32 optimizations = 3;
}

message KickUser {
  structs.GroupOutPeer group_peer = 1;
  structs.UserOutPeer user = 3;
  int64 rid = 4;
  repeated int32 optimizations = 5;
}

message GetGroupInviteUrl {
  structs.GroupOutPeer group_peer = 1;
}

message InviteUsers {
  structs.GroupOutPeer group_peer = 1;
  int64 rid = 2;
  repeated structs.UserOutPeer users = 3;
}

message SetMemberPermissions {
  structs.GroupOutPeer group = 1;
  structs.UserOutPeer user = 2;
  structs.Permissions permissions = 3;
}

message LoadMembers {
  structs.GroupOutPeer group = 1;
  int32 limit = 2;
  bytes next = 3;
  structs.LoadMembersCondition condition = 4;
}

message GetGroupMembersCount {
  structs.GroupOutPeer group = 1;
}

message GetNasimFileUploadUrl {
  int32 expected_size = 1;
  int64 crc = 2;
  int64 uid = 3;
  string name = 4;
  string mime_type = 5;
  structs.ExPeer ex_peer = 6;
  structs.SendTypeValue send_type = 7;
  int64 chunk_size = 8;
}

message StartPhoneAuth {
  int64 phone_number = 1;
  int32 app_id = 2;
  string api_key = 3;
  string device_hash = 4;
  string device_title = 5;
  int32 send_code_type = 9;
}

message ValidateCode {
  string transaction_hash = 1;
  string code = 2;
  structs.BoolValue is_jwt = 3;
}

message ValidatePassword {
  string transaction_hash = 1;
  string password = 2;
  structs.BoolValue is_jwt = 3;
}

message SignUp {
  string transaction_hash = 1;
  string name = 2;
  int32 sex = 3;
  structs.StringValue password = 4;
}

message LoadPinnedMessages {
  structs.ExPeer peer = 1;
}

message RemoveSinglePin {
  structs.GroupOutPeer group_peer = 1;
  int64 rid = 2;
  int64 date = 3;
}

message RemovePin {
  structs.GroupOutPeer group_peer = 1;
}

message Typing {
  structs.OutPeer peer = 1;
  enums.TypingType typing_type = 3;
}

message RemoveUserAdmin {
  structs.GroupOutPeer group_peer = 1;
  structs.UserOutPeer user_peer = 2;
}

message GetNasimFileUrl {
  structs.FileLocation file = 1;
}

message SendMultiMediaMessage {
  structs.ExPeer peer = 1;
  repeated structs.SingleMedia multi_media = 2;
  //structs.MessageOutReference replied_message = 3;
  uint64 grouped_id = 4;
}

message LoadDialogs {
  int64 min_date = 1;
  int32 limit = 2;
  repeated int32 optimizations = 3;
  int32 dialog_type = 4;
  bool exclude_pinned_dialogs = 5;
  int32 archive_filter = 6;
}

message EditParameter {
  string key = 1;
  structs.StringValue value = 2;
}

message GetGroupPreview {
  string token = 1;
}

message TerminateAllSessions {
}