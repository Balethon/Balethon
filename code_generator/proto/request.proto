syntax = "proto3";

package request;

import "struct.proto";

message Request {
  WsRequest ws_request = 1;
}

message WsRequest {
  string service_name = 1;
  string method = 2;
  bytes payload = 3;
  Metadata metadata = 4;
  int64 index = 5;
}


message MetadataComplexValues {
  fixed64 fixed64_value = 6;
}

message MetadataValues {
  string string_value = 1;
  MetadataComplexValues msg_value = 2;
}

message MetadataKeyValues {
  string key = 1;
  MetadataValues value = 2;
}

message Metadata {
  repeated MetadataKeyValues key_values = 1;
}


message KeepAliveRequest {
  KeepAlive payloads = 2;
}

message KeepAlive {
  uint32 value_should_2 = 1;
}


message SetOnline {
  uint32 is_online = 1;
  uint32 duration = 2;
}

message EditName {
  string name = 1;
}

message SendMessage {
  struct.Peer peer = 1;
  int64 rid = 2;
  struct.Message message = 3;
  struct.Peer ex_peer = 6;
}

message UpdateMessage {
  struct.Peer peer = 1;
  int64 rid = 2;
  struct.Message updated_message = 3;
}

message DeleteMessage {
  struct.Peer peer = 1;
  repeated int64 rids = 2;
  struct.DeleteDates dates = 3;
  bool just_mine = 4;
}

message ForwardMessages {
  struct.Peer peer = 1;
  repeated int64 rid = 2;
  repeated struct.HistoryMessageIdentifier forwarded_messages = 3;
}

message GetMessageViews {
  struct.Peer peer = 1;
  repeated struct.MessageId mids = 2;
  bool increment = 3;
}

message MessageSetReaction {
  struct.Peer peer = 1;
  int64 rid = 2;
  string code = 3;
  int64 date = 4;
}

message LoadHistory {
  struct.Peer peer = 1;
  int64 date = 2;
  int32 load_mode = 4;
  int32 limit = 5;
  repeated int32 optimizations = 6;
}

message JoinGroup {
  string token = 1;
  repeated int32 optimizations = 2;
}

message JoinPublicGroup {
  struct.Peer peer = 1;
  repeated int32 optimizations = 2;
}

message LeaveGroup {
  struct.GroupOutPeer group_peer = 1;
  int64 rid = 2;
  repeated int32 optimizations = 3;
  bool make_orphan = 4;
}

message LoadUsers {
  repeated struct.UserOutPeer user_peers = 1;
}

message LoadFullUsers {
  repeated struct.UserOutPeer user_peers = 1;
}

message GetFullGroup {
  struct.GroupOutPeer peer = 1;
}

message SearchContacts {
  string request = 1;
  repeated int32 optimizations = 2;
}

// Pin Message (Group)
message PinMessage {
  int32 sender_user_id = 1;
  struct.GroupOutPeer group_peer = 2;
  int64 date = 3;
  int64 msg_rid = 4;
}

// Pin Messages (Messaging)
message PinMessages {
  struct.Peer peer = 1;
  struct.MessageId message_id = 2;
  bool just_mine = 3;
}

message UnPinMessages {
  struct.ExPeer peer = 1;
  repeated struct.MessageId message_ids = 2;
  bool all = 3;
}

message EditGroupAvatar {
  struct.GroupOutPeer group_peer = 1;
  struct.FileLocation file_location = 3;
  int64 rid = 4;
  repeated int32 optimizations = 5;
}

message LoadGroupAvatars {
  struct.GroupOutPeer peer = 1;
}

message RemoveGroupAvatar {
  struct.GroupOutPeer group_peer = 1;
  int64 rid = 4;
  repeated int32 optimizations = 5;
  struct.Int64Value avatar_id = 6;
}

message EditGroupTitle {
  struct.GroupOutPeer group_peer = 1;
  string title = 3;
  int64 rid = 4;
  repeated int32 optimizations = 5;
}

message EditGroupAbout {
  struct.GroupOutPeer group_peer = 1;
  int64 rid = 2;
  string about = 3;
  repeated int32 optimizations = 5;
}

message RevokeInviteUrl {
  struct.GroupOutPeer group_peer = 1;
}

message UnBanUser {
  struct.GroupOutPeer group_peer = 1;
  struct.UserOutPeer user = 2;
  repeated int32 optimizations = 3;
}

message KickUser {
  struct.GroupOutPeer group_peer = 1;
  struct.UserOutPeer user = 3;
  int64 rid = 4;
  repeated int32 optimizations = 5;
}

message GetGroupInviteUrl {
  struct.GroupOutPeer group_peer = 1;
}

message InviteUsers {
  struct.GroupOutPeer group_peer = 1;
  int64 rid = 2;
  repeated struct.UserOutPeer users = 3;
}

message SetMemberPermissions {
  struct.GroupOutPeer group = 1;
  struct.UserOutPeer user = 2;
  struct.Permissions permissions = 3;
}

message LoadMembers {
  struct.GroupOutPeer group = 1;
  int32 limit = 2;
  bytes next = 3;
  struct.LoadMembersCondition condition = 4;
}

message GetGroupMembersCount {
  struct.GroupOutPeer group = 1;
}

message GetNasimFileUploadUrl {
  int32 expected_size = 1;
  int64 crc = 2;
  int64 uid = 3;
  string name = 4;
  string mime_type = 5;
  struct.ExPeer ex_peer = 6;
  struct.SendTypeValue send_type = 7;
  int64 chunk_size = 8;
}

message StartPhoneAuth {
  int64 phone_number = 1;
  int32 app_id = 2;
  string api_key = 3;
  string device_hash = 4;
  string device_title = 5;
  int32 send_code_type = 9;
}

message ValidateCode {
  string transaction_hash = 1;
  string code = 2;
  struct.BoolValue is_jwt = 3;
}

message LoadPinnedMessages {
  struct.ExPeer peer = 1;
}

message RemoveSinglePin {
  struct.GroupOutPeer group_peer = 1;
  int64 rid = 2;
  int64 date = 3;
}

message RemovePin {
  struct.GroupOutPeer group_peer = 1;
}

message Typing {
    struct.OutPeer peer = 1;
    struct.TypingType typing_type = 3;
}

message RemoveUserAdmin {
    struct.GroupOutPeer group_peer = 1;
    struct.UserOutPeer user_peer = 2;
}

message GetNasimFileUrl {
    struct.FileLocation file = 1;
}

message SendMultiMediaMessage {
    struct.ExPeer peer = 1;
    repeated struct.SingleMedia multi_media = 2;
    //struct.MessageOutReference replied_message = 3;
    uint64 grouped_id = 4;
}