syntax = "proto3";

package structs;

import "structs/collections.proto";
import "structs/files.proto";
import "structs/peers.proto";
import "enums.proto";

message IntroPhoto {
  FastThumb thumb = 1;
  int32 width = 2;
  int32 height = 3;
}

message IntroGif {
  FastThumb thumb = 1;
  int32 width = 2;
  int32 height = 3;
}

message MediaExt {
  oneof trait {
    IntroGif intro_gif = 1;
    IntroPhoto intro_photo = 2;
  }
}

message IntroMedia {
  FileLocation file_location = 1;
  int32 file_size = 2;
  string mime_type = 3;
  string file_name = 4;
  MediaExt media_extra = 5;
}

message IntroMessage {
  StringValue text = 1;
  IntroMedia media = 2;
}

message Intro {
  StringValue text = 1;
  FileLocation file_location = 2;
  int32 width = 3;
  int32 height = 4;
  int32 file_size = 5;
  string mime_type = 6;
  string file_name = 7;
  FastThumb thumb = 8;
}

message BotExInfo {
  StringValue bot_active_users = 1;
  BoolValue has_main_mini_app = 2;
  Intro intro = 3;
  IntroMessage intro_message = 4;
  BoolValue has_timche_profile = 5;
}

message User {
  int32 id = 1;
  int64 access_hash = 2;
  string name = 3;
  StringValue local_name = 4;
  enums.Sex sex = 5;
  Avatar avatar = 6;
  BoolValue is_bot = 7;
  StringValue nick = 9;
  BoolValue is_deleted = 16;
  Int64Value created_at = 19;
  ExInfo ex_info = 20;
  BotExInfo bot_ex_info = 21;
}