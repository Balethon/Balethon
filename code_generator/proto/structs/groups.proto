syntax = "proto3";

package structs;

import "structs/collections.proto";
import "structs/files.proto";
import "structs/messaging.proto";
import "structs/peers.proto";
import "enums.proto";

message Group {
  int32 id = 1;
  string title = 3;
  int32 members_count = 20;
  repeated string available_reactions = 33;
}

message FullGroup {
  int32 id = 1;
  string title = 3;
  Avatar avatar = 4;
  int32 owner_uid = 5;
  int64 create_date = 6;
  enums.GroupType group_type = 7;
  BoolValue is_member = 8;
  Int32Value members_count = 10;
  StringValue nick = 11;
  Permissions permissions = 13;
  Permissions default_permissions = 14;
  StringValue theme = 15;
  StringValue about = 16;
  repeated Member members = 17;
  ExInfo ex_info = 18;
  MessageContainer pin = 19;
  enums.Restriction restriction = 20;
  repeated string available_reactions = 24;
  BoolValue is_suspend = 25;
  Int32Value linked_group_peer_id = 26;
  BoolValue discussion_group_enabled = 27;
}

message Permissions {
  bool see_message = 1;
  bool delete_message = 2;
  bool kick_user = 3;
  bool pin_message = 4;
  bool invite_user = 5;
  bool add_admin = 6;
  bool change_info = 7;
  bool send_message = 8;
  bool see_members = 9;
  bool edit_message = 10;
  bool send_media = 11;
  bool send_gif_stickers = 12;
  bool reply_to_story = 13;
  bool forward_message_from = 14;
  bool send_gift_packet = 15;
  bool start_call = 16;
  bool send_link_message = 17;
  bool send_forwarded_message = 18;
  bool add_story = 19;
  bool manage_call = 20;
}

message LoadMembersCondition {
  bool excepted_permissions = 1;
  bool contacts = 2;
  string query = 3;
}

message Member {
  int32 uid = 1;
  int32 inviter_uid = 2;
  int64 date = 3;
  BoolValue is_admin = 4;
  int32 promoter_user_id = 5;
  int64 promoted_at = 6;
  Permissions permissions = 7;
  string title = 8;
}