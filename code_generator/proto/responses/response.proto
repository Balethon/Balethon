syntax = "proto3";

package response;

import "structs/collections.proto";
import "structs/files.proto";
import "structs/groups.proto";
import "structs/messaging.proto";
import "structs/peers.proto";
import "structs/users.proto";

message Response {
  WsResponse ws_response = 1;
  WsUpdate ws_update = 2;
}

message WsResponse {
  WsError error = 1;
  bytes response = 2;
  int64 index = 3;
}

message WsError {
  int32 code = 1;
  string message = 2;
  structs.MapValue details = 3;
}

message WsUpdate {
  Update update = 1;
}

message Update {
  ComposedUpdate composed_update = 1;
}

message ComposedUpdate {
  bytes message_sent = 4;
  UpdateMessage message = 55;
}


message UpdateMessage {
  structs.Peer peer = 1;
  int32 sender_uid = 2;
  int64 date = 3;
  int64 rid = 4;
  structs.Message message = 5;
  structs.QuotedMessage quoted_message = 7;
  structs.MessageId previous_message_id = 9;
}

message GetMessageViews {
  repeated structs.MessagesViews containers = 1;
}

message LoadHistory {
  repeated structs.MessageContainer history = 1;
}

message JoinGroup {
  structs.Group group = 1;
  int32 seq = 2;
}

message JoinPublicGroup {
  structs.Group group = 1;
  int32 seq = 2;
}

message LoadUsers {
  repeated structs.User users = 1;
}

message GetFullGroup {
  structs.FullGroup full_group = 1;
}

message SearchContacts {
  repeated structs.User users = 1;
  repeated structs.UserOutPeer user_peers = 2;
  repeated structs.Group groups = 4;
  repeated structs.GroupOutPeer group_peers = 5;
}

message EditGroupAvatar {
  structs.Avatar avatar = 1;
  int32 seq = 2;
  bytes state = 3;
  int64 date = 4;
}

message GetGroupInviteUrl {
  string url = 1;
}

message RevokeInviteUrl {
  string url = 1;
}

message InviteUsers {
  repeated structs.UserOutPeer not_added_user_peers = 1;
}

message LoadMembers {
  repeated structs.Member members = 1;
  bytes next = 2;
}

message GetGroupMembersCount {
  int32 members_count = 1;
}

message GetNasimFileUploadUrl {
  int64 file_id = 1;
  string url = 2;
  bool duplicate = 3;
  int32 chunk_size = 4;
  int64 block_size = 5;
}

message StartPhoneAuth {
  string transaction_hash = 1;
  bool is_registered = 2;
  int32 sent_code_type = 5;
  structs.Int64Value code_expiration_date = 6;
  int32 next_send_code_type = 7;
  structs.Int64Value next_send_code_wait_time = 8;
  structs.Int32Value code_timeout = 9;
}

message Auth {
  structs.User user = 2;
  structs.StringValue jwt = 4;
}

message LoadGroupAvatars {
  structs.Avatars avatars = 1;
}

message LoadPinnedMessages {
  repeated structs.MessageContainer pinned_messages = 1;
}

message GetNasimFileUrl {
  structs.FileUrlDescription file_url = 1;
}

message LoadDialogs {
  repeated structs.Group groups = 1;
  repeated structs.User users = 2;
  repeated structs.Dialog dialogs = 3;
  repeated structs.UserOutPeer user_peers = 4;
  repeated structs.GroupOutPeer group_peers = 5;
}

message GetGroupPreview {
  structs.FullGroup group = 1;
  int32 action = 2;
}