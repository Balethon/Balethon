syntax = "proto3";

package responses;

import "structs/collections.proto";
import "structs/users.proto";

message StartPhoneAuth {
  string transaction_hash = 1;
  bool is_registered = 2;
  int32 sent_code_type = 5;
  structs.Int64Value code_expiration_date = 6;
  int32 next_send_code_type = 7;
  structs.Int64Value next_send_code_wait_time = 8;
  structs.Int32Value code_timeout = 9;
}

message Auth {
  structs.User user = 2;
  structs.StringValue jwt = 4;
}